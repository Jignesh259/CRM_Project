<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ heading }}</title>
</head>
<body style="margin:0;padding:0;background-color:#f0f2f5;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f0f2f5;padding:40px 0;">
        <tr>
            <td align="center">
                <table width="500" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.10);overflow:hidden;">

                    <!-- Header -->
                    <tr>
                        <td style="background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);padding:36px 40px;text-align:center;">
                            <p style="color:rgba(255,255,255,0.8);font-size:13px;letter-spacing:2px;text-transform:uppercase;margin:0 0 8px;">CRM System</p>
                            <h1 style="color:#ffffff;margin:0;font-size:26px;font-weight:700;">{{ heading }}</h1>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td style="padding:40px;">
                            <p style="color:#374151;font-size:16px;line-height:1.7;margin:0 0 28px;">
                                Hello,<br>{{ intro }}
                            </p>

                            <!-- OTP Box -->
                            <div style="background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:2px solid #c4b5fd;border-radius:12px;padding:28px;text-align:center;margin:0 0 28px;">
                                <p style="color:#6d28d9;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin:0 0 12px;">Your One-Time Code</p>
                                <span style="font-size:42px;font-weight:800;letter-spacing:12px;color:#4f46e5;font-variant-numeric:tabular-nums;">{{ otp }}</span>
                            </div>

                            <!-- Warning row -->
                            <table width="100%" cellpadding="0" cellspacing="0">
                                <tr>
                                    <td style="background:#fef3c7;border-left:4px solid #f59e0b;border-radius:4px;padding:12px 16px;">
                                        <p style="color:#92400e;font-size:13px;margin:0;">
                                            ⏱ This code expires in <strong>5 minutes</strong>.
                                        </p>
                                    </td>
                                </tr>
                            </table>

                            <p style="color:#9ca3af;font-size:13px;margin:20px 0 0;">
                                If you did not request this, please ignore this email. Your account is safe.
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background:#f9fafb;padding:20px 40px;text-align:center;border-top:1px solid #e5e7eb;">
                            <p style="color:#9ca3af;font-size:12px;margin:0;">© 2026 CRM System. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
