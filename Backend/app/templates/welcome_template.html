<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f7fa;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f7fa;padding:40px 0;">
        <tr>
            <td align="center">
                <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.08);overflow:hidden;">
                    <!-- Header -->
                    <tr>
                        <td style="background:linear-gradient(135deg,#43e97b 0%,#38f9d7 100%);padding:32px 40px;text-align:center;">
                            <h1 style="color:#ffffff;margin:0;font-size:24px;font-weight:600;">Welcome to CRM! 🎉</h1>
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td style="padding:40px;">
                            <p style="color:#333;font-size:16px;line-height:1.6;margin:0 0 24px;">
                                Hi <strong>{{ full_name }}</strong>,
                            </p>
                            <p style="color:#333;font-size:16px;line-height:1.6;margin:0 0 24px;">
                                Your email has been verified and your account is now active. You can log in and start using the CRM platform.
                            </p>
                            <div style="background:#f0fdf4;border-left:4px solid #43e97b;border-radius:4px;padding:16px;margin:0 0 24px;">
                                <p style="color:#166534;font-size:14px;margin:0;">
                                    ✅ Account verified &bull; Ready to use
                                </p>
                            </div>
                            <p style="color:#999;font-size:13px;margin:0;">
                                If you have any questions, reach out to our support team.
                            </p>
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td style="background:#f9fafb;padding:20px 40px;text-align:center;border-top:1px solid #eee;">
                            <p style="color:#aaa;font-size:12px;margin:0;">&copy; 2026 CRM System. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
